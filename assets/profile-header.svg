<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Arpit Tagade</title>
  <desc id="desc">Full-Stack AI Engineer and Hardware Developer</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="18%" r="68%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="24" fill="url(#glow)"/>

  <g opacity="0.12" stroke="#cbd5e1">
    <path d="M0 72H1200M0 144H1200M0 216H1200M0 288H1200"/>
    <path d="M120 0V360M240 0V360M360 0V360M480 0V360M600 0V360M720 0V360M840 0V360M960 0V360M1080 0V360"/>
  </g>

  <circle cx="1010" cy="72" r="96" fill="#38bdf8" opacity="0.06" filter="url(#soft)"/>
  <circle cx="1090" cy="300" r="130" fill="#818cf8" opacity="0.07" filter="url(#soft)"/>

  <rect x="72" y="72" width="10" height="216" rx="5" fill="url(#accent)"/>

  <text x="120" y="145" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-1.4">Arpit Tagade</text>
  <text x="122" y="197" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="500">Full-Stack AI Engineer · Backend Systems · IoT Hardware</text>
  <text x="122" y="242" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Building reliable software, AI platforms, and connected hardware.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">
    <rect x="122" y="272" width="154" height="40" rx="20" fill="#0f172a" stroke="#334155"/>
    <circle cx="145" cy="292" r="5" fill="#38bdf8"/>
    <text x="160" y="298" fill="#e2e8f0">Nagpur, India</text>

    <rect x="290" y="272" width="174" height="40" rx="20" fill="#0f172a" stroke="#334155"/>
    <circle cx="313" cy="292" r="5" fill="#818cf8"/>
    <text x="328" y="298" fill="#e2e8f0">Production-first</text>

    <rect x="478" y="272" width="186" height="40" rx="20" fill="#0f172a" stroke="#334155"/>
    <circle cx="501" cy="292" r="5" fill="#2dd4bf"/>
    <text x="516" y="298" fill="#e2e8f0">Software ↔ Hardware</text>
  </g>

  <g transform="translate(890 138)">
    <rect x="0" y="0" width="220" height="124" rx="18" fill="#0b1220" stroke="#334155"/>
    <circle cx="27" cy="27" r="5" fill="#38bdf8"/>
    <circle cx="47" cy="27" r="5" fill="#818cf8"/>
    <circle cx="67" cy="27" r="5" fill="#2dd4bf"/>
    <path d="M28 58H104M28 78H167M28 98H137" stroke="#64748b" stroke-width="7" stroke-linecap="round"/>
    <path d="M28 58H76" stroke="url(#accent)" stroke-width="7" stroke-linecap="round">
      <animate attributeName="d" values="M28 58H76;M28 58H144;M28 58H76" dur="4.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <rect x="0" y="350" width="1200" height="10" rx="5" fill="url(#accent)" opacity="0.95">
    <animate attributeName="opacity" values="0.72;1;0.72" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
