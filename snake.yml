# ─────────────────────────────────────────────────────────
# Save this file at:
#   .github/workflows/snake.yml
# inside your profile repo: tagadearpit/tagadearpit
#
# Then go to:
#   Settings → Actions → General → Workflow permissions
#   → select "Read and write permissions" → Save
#
# Then manually trigger it once under the "Actions" tab.
# After that it runs automatically every day at midnight.
# ─────────────────────────────────────────────────────────

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day at midnight UTC
  workflow_dispatch:        # Allows manual trigger from Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: tagadearpit
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
